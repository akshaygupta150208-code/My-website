<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshay Gupta | Portfolio</title>
    <style>
        /* CSS Variables for Dark/Light Mode */
        :root {
            --bg-color: #ffffff;
            --text-color: #2c3e50;
            --accent-color: #3498db;
            --card-bg: #f8f9fa;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #f4f4f4;
            --accent-color: #00d4ff;
            --card-bg: #2d2d2d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: 0.3s;
            margin: 0;
            padding: 0;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: var(--card-bg);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Dark Mode Button */
        #theme-toggle {
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 20px;
            border: 2px solid var(--accent-color);
            background: none;
            color: var(--accent-color);
            font-weight: bold;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 80px 20px;
        }

        .hero h1 { font-size: 3rem; margin-bottom: 10px; }
        .hero p { color: var(--accent-color); font-size: 1.2rem; }

        /* Project Grid */
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid var(--accent-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Contact Section */
        .contact-form {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            margin-top: 50px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .btn {
            background: var(--accent-color);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body data-theme="light">

    <nav>
        <div style="font-weight: bold; font-size: 1.5rem;">AG.</div>
        <button id="theme-toggle">Switch Theme</button>
    </nav>

    <div class="hero">
        <h1>Akshay Gupta</h1>
        <p>Data Scientist | AI Engineer | JEE Aspirant</p>
    </div>

    <div class="container">
        <h2>My Projects</h2>
        <div class="grid">
            <div class="card">
                <h3>AI Chatbot</h3>
                <p>A simple python-based chatbot using basic NLP techniques.</p>
            </div>
            <div class="card">
                <h3>Data Analysis</h3>
                <p>Analyzing JEE exam trends using Pandas and Matplotlib.</p>
            </div>
            <div class="card">
                <h3>Personal Portfolio</h3>
                <p>This website! Built entirely on a mobile phone.</p>
            </div>
        </div>

        <div class="contact-form">
            <h2>Contact Me</h2>
            <form id="my-form">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" rows="4"></textarea>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
    </div>

    <script>
        // DARK MODE FUNCTION
        const toggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        toggleBtn.addEventListener('click', () => {
            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                toggleBtn.innerText = "Light Mode";
            } else {
                body.setAttribute('data-theme', 'light');
                toggleBtn.innerText = "Dark Mode";
            }
        });

        // FORM ALERT FUNCTION
        document.getElementById('my-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Dhanyawad! Your message has been sent (simulated).");
        });
    </script>

</body>
</html>
